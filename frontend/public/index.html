        <!-- Error suppression script (kept from original) -->
        <script>
            window.addEventListener("error", function(e) {
                if (e.error instanceof DOMException && 
                    e.error.name === "DataCloneError" && 
                    e.message && e.message.includes("PerformanceServerTiming")) {
                    e.stopImmediatePropagation();
                    e.preventDefault();
                }
            }, true);
        </script>

        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
    </head>

        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

        <!-- Updated floating credit badge -->

        <!-- Modern floating badge styles -->
        <style>
            .credit-badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 10px 20px;
                background: linear-gradient(135deg, rgba(40, 40, 80, 0.28), rgba(90, 70, 200, 0.20));
                color: #f0f0ff;
                border-radius: 999px;
                position: fixed;
                bottom: 28px;
                right: 28px;
                font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                font-size: 13.5px;
                font-weight: 600;
                letter-spacing: 0.3px;
                text-decoration: none;
                z-index: 9999;
                box-shadow: 
                    0 10px 40px rgba(0,0,0,0.4),
                    inset 0 1px 0 rgba(255,255,255,0.08);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.10);
                transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
                overflow: hidden;
                isolation: isolate;
            }

            .credit-badge::before {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: inherit;
                background: linear-gradient(90deg, transparent, rgba(180,140,255,0.18), transparent);
                transform: translateX(-120%);
                transition: transform 0.75s ease;
                z-index: -1;
            }

            .credit-badge:hover {
                transform: scale(1.14) translateY(-6px);
                box-shadow: 
                    0 20px 60px rgba(90, 70, 220, 0.45),
                    0 0 0 3px rgba(140, 100, 255, 0.22);
                color: #ffffff;
            }

            .credit-badge:hover::before {
                transform: translateX(120%);
            }

            /* Optional: slight pulse on load (very subtle) */
            @keyframes subtlePulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.02); }
            }

            .credit-badge {
                animation: subtlePulse 8s ease-in-out infinite;
            }
        </style>
